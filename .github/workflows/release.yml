name: Create Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build all release AARs
        run: ./gradlew clean :app:assembleRelease

      - name: Prepare release AARs
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          BAZAR_AAR="$(find app/build/outputs/aar -type f -iname "*bazar*release*.aar" | head -n 1)"
          MYKET_AAR="$(find app/build/outputs/aar -type f -iname "*myket*release*.aar" | head -n 1)"
          GOOGLE_AAR="$(find app/build/outputs/aar -type f -iname "*googleplay*release*.aar" | head -n 1)"

          if [[ -z "$BAZAR_AAR" ]]; then
            echo "Bazaar AAR not found"
            exit 1
          fi

          if [[ -z "$MYKET_AAR" ]]; then
            echo "Myket AAR not found"
            exit 1
          fi

          if [[ -z "$GOOGLE_AAR" ]]; then
            echo "Google Play AAR not found"
            exit 1
          fi

          cp "$BAZAR_AAR" "release-assets/appro-base-bazar.aar"
          cp "$MYKET_AAR" "release-assets/appro-base-myket.aar"
          cp "$GOOGLE_AAR" "release-assets/appro-base-google-play.aar"

          ls -la release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload \
              "$GITHUB_REF_NAME" \
              release-assets/appro-base-bazar.aar \
              release-assets/appro-base-myket.aar \
              release-assets/appro-base-google-play.aar \
              --clobber
          else
            gh release create \
              "$GITHUB_REF_NAME" \
              release-assets/appro-base-bazar.aar \
              release-assets/appro-base-myket.aar \
              release-assets/appro-base-google-play.aar \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi